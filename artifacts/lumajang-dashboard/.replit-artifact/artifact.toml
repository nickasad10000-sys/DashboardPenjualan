kind = "web"
previewPath = "/"
title = "Dashboard Perumahan Lumajang"
version = "1.0.0"
id = "artifacts/lumajang-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24105

[services.development]
run = "pnpm --filter @workspace/lumajang-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lumajang-dashboard", "run", "build" ]
publicDir = "artifacts/lumajang-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24105"
BASE_PATH = "/"
